<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Scheduler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .order-id {
            font-weight: 600;
            color: #333;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-active {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-completed {
            background: #dcfce7;
            color: #166534;
        }

        .order-details {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .order-details p {
            margin-bottom: 5px;
        }

        .order-actions {
            display: flex;
            gap: 8px;
        }

        .order-actions button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .logs-table thead {
            background: #f0f0f0;
        }

        .logs-table th,
        .logs-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .logs-table th {
            font-weight: 600;
            color: #333;
        }

        .logs-table tr:hover {
            background: #f9f9f9;
        }

        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-info {
            background: #e0e7ff;
            color: #312e81;
            border: 1px solid #a5b4fc;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-close {
            float: right;
            font-size: 1.5em;
            cursor: pointer;
            background: none;
            border: none;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .day-pattern-section {
            display: none;
        }

        .day-pattern-section.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .orders-grid {
                grid-template-columns: 1fr;
            }

            .logs-table {
                font-size: 12px;
            }

            .logs-table th,
            .logs-table td {
                padding: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Order Scheduler</h1>
            <p>Schedule your orders with ease and precision</p>
        </div>

        <div id="auth-section" class="card">
            <h2>Authentication</h2>
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('login')">Login</button>
                <button class="tab-button" onclick="switchTab('register')">Register</button>
            </div>

            <div id="login" class="tab-content active">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 12px;">Login</button>
                </form>
            </div>

            <div id="register" class="tab-content">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Name:</label>
                        <input type="text" id="registerName" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" id="registerEmail" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password:</label>
                        <input type="password" id="registerPassword" placeholder="Minimum 8 characters" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 12px;">Register</button>
                </form>
            </div>
        </div>

        <div id="app-section" style="display: none;">
            <div
                style="text-align: right; margin-bottom: 20px; display: flex; justify-content: flex-end; align-items: center;">
                <span style="margin-right: 15px; font-weight: 600; color: #ffffff;">Welcome,</span>
                <span id="userNameDisplay" style="margin-right: 15px; font-weight: 600; color: #ffffff;"></span>
                <button onclick="logout()" class="btn-secondary" style="max-width: 100px;">Logout</button>
            </div>

            <div class="main-content">
                <div class="card">
                    <h2>Create New Order</h2>
                    <form onsubmit="handleCreateOrder(event)">
                        <div class="form-group">
                            <label for="itemId">Item:</label>
                            <select id="itemId" required onchange="updateItemPrice()">
                                <option value="">Select an item</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price: $<span id="itemPrice">0.00</span></label>
                        </div>
                        <div class="form-group">
                            <label for="quantity">Quantity:</label>
                            <input type="number" id="quantity" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="scheduledTime">Scheduled Time:</label>
                            <input type="datetime-local" id="scheduledTime" required>
                        </div>
                        <div class="form-group">
                            <label for="recurrenceType">Recurrence:</label>
                            <select id="recurrenceType" onchange="updateRecurrencePattern()">
                                <option value="">None (One-time)</option>
                                <option value="minutely">Minutely</option>
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly</option>
                                <option value="monthly">Monthly</option>
                            </select>
                        </div>

                        <!-- Weekly Pattern Selection -->
                        <div id="weeklyPatternSection" class="day-pattern-section form-group">
                            <label>Select Days (Weekly):</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_0" name="weekday" value="0">
                                    <label for="day_0">Sunday</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_1" name="weekday" value="1">
                                    <label for="day_1">Monday</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_2" name="weekday" value="2">
                                    <label for="day_2">Tuesday</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_3" name="weekday" value="3">
                                    <label for="day_3">Wednesday</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_4" name="weekday" value="4">
                                    <label for="day_4">Thursday</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_5" name="weekday" value="5">
                                    <label for="day_5">Friday</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="day_6" name="weekday" value="6">
                                    <label for="day_6">Saturday</label>
                                </div>
                            </div>
                        </div>

                        <!-- Monthly Pattern Selection -->
                        <div id="monthlyPatternSection" class="day-pattern-section form-group">
                            <label>Select Days of Month (1-31):</label>
                            <div id="monthlyDaysContainer" class="checkbox-group">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="recurrenceEnd">Recurrence End Date (optional):</label>
                            <input type="datetime-local" id="recurrenceEnd">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%; padding: 12px;">Create
                            Order</button>
                    </form>
                </div>

                <div class="card">
                    <h2>Your Orders</h2>
                    <div id="ordersContainer" class="orders-grid">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No orders yet. Create one to get started!</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Execution Logs</h2>
                    <button onclick="refreshLogs()" class="btn-secondary"
                        style="margin-bottom: 15px; width: 100%; padding: 10px;">Refresh Logs</button>
                    <div id="logsContainer">
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>No execution logs yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer" style="position: fixed; top: 20px; right: 20px; z-index: 999; max-width: 400px;"></div>

    <!-- Edit Order Modal -->
    <div id="editOrderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                Edit Order
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form onsubmit="handleUpdateOrder(event)">
                <input type="hidden" id="editOrderId">
                <div class="form-group">
                    <label>Item: <span id="editItemName" style="font-weight: bold;"></span></label>
                </div>
                <div class="form-group">
                    <label for="editQuantity">Quantity:</label>
                    <input type="number" id="editQuantity" min="1" required>
                </div>
                <div class="form-group">
                    <label for="editScheduledTime">Scheduled Time:</label>
                    <input type="datetime-local" id="editScheduledTime" required>
                </div>
                <div class="form-group">
                    <label for="editRecurrenceType">Recurrence:</label>
                    <select id="editRecurrenceType" onchange="updateEditRecurrencePattern()">
                        <option value="">None (One-time)</option>
                        <option value="minutely">Minutely</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>

                <!-- Weekly Pattern Selection in Edit Modal -->
                <div id="editWeeklyPatternSection" class="day-pattern-section form-group">
                    <label>Select Days (Weekly):</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_0" name="editWeekday" value="0">
                            <label for="editDay_0">Sunday</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_1" name="editWeekday" value="1">
                            <label for="editDay_1">Monday</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_2" name="editWeekday" value="2">
                            <label for="editDay_2">Tuesday</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_3" name="editWeekday" value="3">
                            <label for="editDay_3">Wednesday</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_4" name="editWeekday" value="4">
                            <label for="editDay_4">Thursday</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_5" name="editWeekday" value="5">
                            <label for="editDay_5">Friday</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="editDay_6" name="editWeekday" value="6">
                            <label for="editDay_6">Saturday</label>
                        </div>
                    </div>
                </div>

                <!-- Monthly Pattern Selection in Edit Modal -->
                <div id="editMonthlyPatternSection" class="day-pattern-section form-group">
                    <label>Select Days of Month (1-31):</label>
                    <div id="editMonthlyDaysContainer" class="checkbox-group">
                    </div>
                </div>
                <div class="form-group">
                    <label for="editRecurrenceEnd">Recurrence End (optional):</label>
                    <input type="datetime-local" id="editRecurrenceEnd">
                </div>
                <div class="form-group">
                    <label for="editStatus">Status:</label>
                    <select id="editStatus">
                        <option value="pending">Pending</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 12px;">Update Order</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let authToken = null;
        let currentUser = null;
        let itemPrices = {};
        let refreshInterval = null; // stores ID from setInterval

        // Wrapper function for API calls with token expiration handling
        async function apiCall(url, options = {}) {
            try {
                const response = await fetch(url, options);
                
                // Handle token expiration (401 Unauthorized)
                if (response.status === 401) {
                    handleTokenExpired();
                }
                
                return response;
            } catch (error) {
                throw error;
            }
        }

        // Handle token expiration - clear session and redirect to login
        function handleTokenExpired() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            
            // Stop auto-refresh
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
            
            // Show UI
            document.getElementById('auth-section').style.display = '';
            document.getElementById('app-section').style.display = 'none';
            
            // Show alert to user
            showAlert('Your session has expired. Please log in again.', 'error');
            
            // Switch to login tab
            switchTab('login');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                authToken = token;
                showAppSection();
                loadInitialData();
            }

            // Set minimum scheduled time to now
            const now = new Date();
            now.setMinutes(now.getMinutes() + 1);
            document.getElementById('scheduledTime').min = now.toISOString().slice(0, 16);

            // Generate monthly days checkboxes
            generateMonthlyDaysCheckboxes('monthlyDaysContainer');
            generateMonthlyDaysCheckboxes('editMonthlyDaysContainer');
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
        }

        // Generate monthly day checkboxes dynamically
        function generateMonthlyDaysCheckboxes(containerId) {
            const container = document.getElementById(containerId);
            let html = '';
            for (let day = 1; day <= 31; day++) {
                const checkId = containerId.includes('edit') ? `editMday_${day}` : `mday_${day}`;
                const nameAttr = containerId.includes('edit') ? 'editMonthday' : 'monthday';
                html += `<div class="checkbox-item">
                    <input type="checkbox" id="${checkId}" name="${nameAttr}" value="${day}">
                    <label for="${checkId}">${day}</label>
                </div>`;
            }
            container.innerHTML = html;
        }

        // Update visibility of recurrence pattern sections
        function updateRecurrencePattern() {
            const recurrenceType = document.getElementById('recurrenceType').value;
            document.getElementById('weeklyPatternSection').classList.toggle('active', recurrenceType === 'weekly');
            document.getElementById('monthlyPatternSection').classList.toggle('active', recurrenceType === 'monthly');
        }

        // Update visibility of recurrence pattern sections in edit modal
        function updateEditRecurrencePattern() {
            const recurrenceType = document.getElementById('editRecurrenceType').value;
            document.getElementById('editWeeklyPatternSection').classList.toggle('active', recurrenceType === 'weekly');
            document.getElementById('editMonthlyPatternSection').classList.toggle('active', recurrenceType === 'monthly');
        }

        // Get selected pattern based on recurrence type
        function getSelectedPattern() {
            const recurrenceType = document.getElementById('recurrenceType').value;
            
            if (recurrenceType === 'weekly') {
                const selected = Array.from(document.querySelectorAll('input[name="weekday"]:checked'))
                    .map(el => parseInt(el.value));
                return selected.length > 0 ? { type: 'weekly', days: selected } : null;
            } else if (recurrenceType === 'monthly') {
                const selected = Array.from(document.querySelectorAll('input[name="monthday"]:checked'))
                    .map(el => parseInt(el.value));
                return selected.length > 0 ? { type: 'monthly', days: selected } : null;
            }
            return null;
        }

        // Get selected pattern from edit modal
        function getEditSelectedPattern() {
            const recurrenceType = document.getElementById('editRecurrenceType').value;
            
            if (recurrenceType === 'weekly') {
                const selected = Array.from(document.querySelectorAll('input[name="editWeekday"]:checked'))
                    .map(el => parseInt(el.value));
                return selected.length > 0 ? { type: 'weekly', days: selected } : null;
            } else if (recurrenceType === 'monthly') {
                const selected = Array.from(document.querySelectorAll('input[name="editMonthday"]:checked'))
                    .map(el => parseInt(el.value));
                return selected.length > 0 ? { type: 'monthly', days: selected } : null;
            }
            return null;
        }

        // Set pattern checkboxes from data when editing
        function setPatternFromData(pattern) {
            if (!pattern) return;
            
            if (pattern.type === 'weekly') {
                pattern.days.forEach(day => {
                    const checkbox = document.getElementById(`editDay_${day}`);
                    if (checkbox) checkbox.checked = true;
                });
            } else if (pattern.type === 'monthly') {
                pattern.days.forEach(day => {
                    const checkbox = document.getElementById(`editMday_${day}`);
                    if (checkbox) checkbox.checked = true;
                });
            }
        }

        // Format pattern for display
        function formatPattern(pattern) {
            if (!pattern) return '';
            
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            if (pattern.type === 'weekly') {
                const days = pattern.days.map(d => dayNames[d]).join(', ');
                return `Specific days: ${days}`;
            } else if (pattern.type === 'monthly') {
                const days = pattern.days.join(', ');
                return `Days of month: ${days}`;
            }
            return '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await apiCall(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('authToken', authToken);
                    showAlert('Login successful!', 'success');
                    showAppSection();
                    document.getElementById('userNameDisplay').textContent = currentUser.name;
                    loadInitialData();
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPassword').value = '';
                } else {
                    showAlert(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await apiCall(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Registration successful! Please login.', 'success');
                    switchTab('login');
                    document.getElementById('registerName').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                } else {
                    showAlert(data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            document.getElementById('auth-section').style.display = '';
            document.getElementById('app-section').style.display = 'none';
            showAlert('Logged out successfully', 'info');
            // stop background refreshes
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        function showAppSection() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = '';
        }

        async function loadInitialData() {
            await loadUserProfile();
            await loadItems();
            await loadOrders();
            await loadLogs();

            // Auto-refresh every 10 seconds
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                loadOrders();
                loadLogs();
            }, 10000);
        }

        async function loadItems() {
            try {
                const response = await apiCall(`${API_URL}/orders/items`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                const itemSelect = document.getElementById('itemId');
                itemSelect.innerHTML = '<option value="">Select an item</option>';

                data.items.forEach(item => {
                    itemPrices[item.id] = item.price;
                    const option = document.createElement('option');
                    option.value = item.id;
                    option.textContent = `${item.name} - $${item.price.toFixed(2)}`;
                    itemSelect.appendChild(option);
                });
            } catch (error) {
                showAlert('Failed to load items', 'error');
            }
        }

        function updateItemPrice() {
            const itemId = document.getElementById('itemId').value;
            document.getElementById('itemPrice').textContent = (itemPrices[itemId] || 0).toFixed(2);
        }

        async function handleCreateOrder(e) {
            e.preventDefault();

            const itemId = parseInt(document.getElementById('itemId').value);
            const quantity = parseInt(document.getElementById('quantity').value);

            // Get the local datetime from datetime-local input
            const scheduledTimeInput = document.getElementById('scheduledTime').value;
            // Create Date object (interprets input as local) and convert to UTC ISO string
            const scheduledTime = scheduledTimeInput ? new Date(scheduledTimeInput).toISOString() : null;

            const recurrenceType = document.getElementById('recurrenceType').value || null;
            const recurrenceEndInput = document.getElementById('recurrenceEnd').value;
            const recurrenceEnd = recurrenceEndInput ? new Date(recurrenceEndInput).toISOString() : null;
            const recurrencePattern = getSelectedPattern();

            try {
                const response = await apiCall(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        itemId,
                        quantity,
                        scheduledTime,
                        recurrenceType,
                        recurrenceEnd,
                        recurrencePattern
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Order created successfully!', 'success');
                    document.getElementById('itemId').value = '';
                    document.getElementById('quantity').value = '1';
                    document.getElementById('scheduledTime').value = '';
                    document.getElementById('recurrenceType').value = '';
                    document.getElementById('recurrenceEnd').value = '';
                    document.querySelectorAll('input[name="weekday"]').forEach(el => el.checked = false);
                    document.querySelectorAll('input[name="monthday"]').forEach(el => el.checked = false);
                    updateRecurrencePattern();
                    updateItemPrice();
                    await loadOrders();
                } else {
                    showAlert(data.error || 'Failed to create order', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        async function loadOrders() {
            if (!authToken) return; // nothing to do when logged out
            try {
                const response = await apiCall(`${API_URL}/orders`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                currentOrders = data.orders; // Save for edit modal
                const container = document.getElementById('ordersContainer');

                if (data.orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No orders yet. Create one to get started!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">Order #${order.id}</span>
                            <span class="order-status status-${order.status.toLowerCase()}">${order.status}</span>
                        </div>
                        <div class="order-details">
                            <p><strong>${order.itemName}</strong></p>
                            <p>Quantity: ${order.quantity}</p>
                            <p>Scheduled: ${formatDate(order.scheduledTime)}</p>
                            ${order.recurrenceType ? `<p>Recurrence: ${order.recurrenceType}</p>` : ''}
                            ${order.recurrencePattern ? `<p>${formatPattern(order.recurrencePattern)}</p>` : ''}
                            ${order.recurrenceEnd ? `<p>Ends: ${formatDate(order.recurrenceEnd)}</p>` : ''}
                        </div>
                        <div class="order-actions">
                            <button onclick="openEditModal('${order.id}')" class="btn-secondary" ${order.status !== 'pending' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>Edit</button>
                            <button onclick="deleteOrder('${order.id}')" class="btn-danger" ${order.status !== 'pending' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showAlert('Failed to load orders', 'error');
            }
        }

        async function deleteOrder(orderId) {
            if (!confirm('Are you sure you want to delete this order?')) return;

            try {
                console.log('Deleting order:', orderId, 'Token:', authToken ? 'present' : 'missing');

                const response = await apiCall(`${API_URL}/orders/${orderId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Delete response status:', response.status);

                if (response.ok) {
                    showAlert('Order deleted successfully', 'success');
                    await loadOrders();
                } else {
                    const data = await response.json();
                    console.log('Delete error:', data);
                    showAlert(data.error || 'Failed to delete order', 'error');
                }
            } catch (error) {
                console.error('Delete error:', error);
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        async function loadLogs() {
            if (!authToken) return; // skip when logged out
            try {
                const response = await apiCall(`${API_URL}/logs`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                const data = await response.json();
                const container = document.getElementById('logsContainer');

                if (data.logs.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>No execution logs yet.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Execution Time</th>
                                <th>Status</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.logs.map(log => `
                                <tr>
                                    <td>#${log.orderId}</td>
                                    <td>${formatDate(log.executionTime)}</td>
                                    <td><span class="order-status status-${log.status.toLowerCase()}">${log.status}</span></td>
                                    <td>${formatDetails(log.details)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showAlert('Failed to load logs', 'error');
            }
        }

        async function refreshLogs() {
            await loadLogs();
            showAlert('Logs refreshed', 'info');
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        async function loadUserProfile() {
            try {
                const response = await apiCall(`${API_URL}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    currentUser = data.user;
                    if (currentUser && currentUser.name) {
                        document.getElementById('userNameDisplay').textContent = currentUser.name;
                    }
                }
            } catch (error) {
                console.error("Failed to load profile", error);
            }
        }

        // Helper to convert ISO string to local datetime-local input format
        function toLocalISOString(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            // Adjust to local time for input value: YYYY-MM-DDThh:mm
            const offsetMs = date.getTimezoneOffset() * 60 * 1000;
            const localDate = new Date(date.getTime() - offsetMs);
            return localDate.toISOString().slice(0, 16);
        }

        // Store orders temporarily to populate edit modal easily
        let currentOrders = [];

        async function openEditModal(orderId) {
            // Find order from the currently loaded list (saved in loadOrders or fetched again)
            // To simplify, let's fetch specific order or find in DOM. 
            // Best to just use the data we have. Let's make loadOrders save data.
            const order = currentOrders.find(o => o.id == orderId); // assuming currentOrders is populated
            if (!order) return;

            document.getElementById('editOrderId').value = order.id;
            document.getElementById('editItemName').textContent = order.itemName;
            document.getElementById('editQuantity').value = order.quantity;
            document.getElementById('editScheduledTime').value = toLocalISOString(order.scheduledTime);
            document.getElementById('editRecurrenceType').value = order.recurrenceType || '';
            document.getElementById('editRecurrenceEnd').value = toLocalISOString(order.recurrenceEnd);
            document.getElementById('editStatus').value = order.status.toLowerCase();

            // Clear all checkboxes
            document.querySelectorAll('input[name="editWeekday"]').forEach(el => el.checked = false);
            document.querySelectorAll('input[name="editMonthday"]').forEach(el => el.checked = false);

            // Set pattern checkboxes if pattern exists
            if (order.recurrencePattern) {
                setPatternFromData(order.recurrencePattern);
            }

            // Show/hide pattern sections based on recurrence type
            updateEditRecurrencePattern();

            document.getElementById('editOrderModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editOrderModal').classList.remove('show');
        }

        async function handleUpdateOrder(e) {
            e.preventDefault();
            const orderId = document.getElementById('editOrderId').value;
            const quantity = parseInt(document.getElementById('editQuantity').value);

            const scheduledTimeInput = document.getElementById('editScheduledTime').value;
            const scheduledTime = scheduledTimeInput ? new Date(scheduledTimeInput).toISOString() : null;

            const recurrenceType = document.getElementById('editRecurrenceType').value || null;

            const recurrenceEndInput = document.getElementById('editRecurrenceEnd').value;
            const recurrenceEnd = recurrenceEndInput ? new Date(recurrenceEndInput).toISOString() : null;

            const status = document.getElementById('editStatus').value;
            const recurrencePattern = getEditSelectedPattern();

            try {
                const response = await apiCall(`${API_URL}/orders/${orderId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        quantity,
                        scheduledTime,
                        recurrenceType,
                        recurrenceEnd,
                        status,
                        recurrencePattern
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Order updated successfully', 'success');
                    closeEditModal();
                    loadOrders();
                } else {
                    showAlert(data.error || 'Failed to update order', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        function formatDetails(details) {
            if (!details) return '-';
            if (typeof details === 'string') return details;
            return Object.entries(details)
                .map(([key, value]) => `${key}: ${value}`)
                .join(' | ');
        }

        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertDiv.style.marginBottom = '10px';

            alertContainer.appendChild(alertDiv);

            setTimeout(() => {
                alertDiv.style.opacity = '0';
                alertDiv.style.transition = 'opacity 0.3s ease';
                setTimeout(() => alertDiv.remove(), 300);
            }, 5000);
        }
    </script>
</body>

</html>
